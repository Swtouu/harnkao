<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarnKao — Trip Expense Splitter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   LIGHT THEME  (PANTONE 14-3812 TCX Pastel Lilac)
══════════════════════════════════════════ */
:root {
  --bg:           #F9F7FC;
  --surface:      #FFFFFF;
  --surface2:     #F4EFFA;
  --surface3:     #EDE7F6;
  --border:       #DDD3ED;
  --border-soft:  #EDE7F6;

  --text:         #2A1F3D;
  --text-muted:   #8674A3;
  --text-hint:    #B0A0C8;

  --lilac-deep:   #A090BA;
  --lilac-dark:   #5C4A7A;
  --lilac-darker: #3D2F55;
  --lilac-light:  #E8DFF2;
  --lilac-xlight: #F4EFFA;

  --grad-a: #7B5EA7;
  --grad-b: #A090BA;

  --positive:        #4A8C64;
  --positive-bg:     #E8F5EE;
  --positive-border: #B8DFC8;
  --negative:        #B04060;
  --negative-bg:     #FAEAEF;
  --negative-border: #ECC0CE;
  --warning:         #9A7040;
  --warning-bg:      #FBF3E5;
  --warning-border:  #EED9B8;

  --radius:    12px;
  --radius-lg: 20px;

  --card-shadow: 0 2px 12px rgba(90,60,140,0.06), 0 1px 3px rgba(90,60,140,0.04);
}

/* ══════════════════════════════════════════
   DARK THEME
══════════════════════════════════════════ */
[data-theme="dark"] {
  --bg:           #1A1525;
  --surface:      #241C34;
  --surface2:     #2D2340;
  --surface3:     #362A4C;
  --border:       #4A3B62;
  --border-soft:  #3D2F55;

  --text:         #EDE7F6;
  --text-muted:   #A890C8;
  --text-hint:    #6A5880;

  --lilac-deep:   #9880B8;
  --lilac-dark:   #C0A8E0;
  --lilac-darker: #DDD0F0;
  --lilac-light:  #362A4C;
  --lilac-xlight: #2D2340;

  --grad-a: #5C4090;
  --grad-b: #8070A8;

  --positive:        #5CB87A;
  --positive-bg:     #1A2E22;
  --positive-border: #2A5038;
  --negative:        #E07090;
  --negative-bg:     #2E1820;
  --negative-border: #5A2A38;
  --warning:         #C89850;
  --warning-bg:      #2A2010;
  --warning-border:  #5A4020;

  --card-shadow: 0 2px 16px rgba(0,0,0,0.3);
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

html { transition: background 0.3s; }

body {
  font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header {
  background: linear-gradient(135deg, var(--grad-a) 0%, var(--grad-b) 100%);
  position: sticky; top: 0; z-index: 100;
  transition: background 0.3s;
}
.header-inner {
  max-width: 840px; margin: 0 auto;
  padding: 0.9rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
}
.logo-block { display: flex; align-items: center; gap: 0.65rem; }
.logo-icon {
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.2);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.logo-text h1 { font-size: 1.15rem; font-weight: 600; color: #fff; letter-spacing: -0.02em; line-height: 1.2; }
.logo-text p  { font-size: 0.74rem; color: rgba(255,255,255,0.7); font-weight: 300; }

.header-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

/* Currency pill */
.currency-pill {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 100px;
  padding: 0 0.1rem 0 0.7rem;
  display: flex; align-items: center;
}
.currency-pill select {
  background: transparent; border: none; color: #fff;
  font-size: 0.8rem; font-family: inherit; font-weight: 500;
  cursor: pointer; outline: none; padding: 0.32rem 0.5rem 0.32rem 0;
  -webkit-appearance: none; appearance: none;
}
.currency-pill select option { background: #3D2F55; color: #fff; }

/* Theme toggle */
.theme-toggle {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 100px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem;
  transition: background 0.15s, transform 0.2s;
}
.theme-toggle:hover { background: rgba(255,255,255,0.28); transform: rotate(15deg); }

/* ══════════════════════════════════════════
   RATE BANNER
══════════════════════════════════════════ */
.rate-banner {
  display: none;
  align-items: center; gap: 0.6rem;
  background: var(--surface); border: 1px solid var(--border-soft);
  border-radius: var(--radius); padding: 0.55rem 0.9rem;
  font-size: 0.8rem; color: var(--text-muted);
  flex-wrap: wrap;
  transition: background 0.3s;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-live  { background: #4CAF50; box-shadow: 0 0 0 2px rgba(76,175,80,0.25); }
.dot-cache { background: #FF9800; box-shadow: 0 0 0 2px rgba(255,152,0,0.25); }
.dot-off   { background: var(--text-hint); }
.rate-status { margin-left: auto; font-size: 0.72rem; color: var(--text-hint); }

/* ══════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════ */
.main {
  max-width: 840px; margin: 0 auto;
  padding: 1.5rem 1rem 5rem;
  display: flex; flex-direction: column; gap: 1rem;
}

.section-eyebrow {
  font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-muted);
  display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.55rem;
}
.section-eyebrow::after { content:''; flex:1; height:1px; background:var(--border-soft); }

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.4rem;
  box-shadow: var(--card-shadow);
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}

/* ══════════════════════════════════════════
   PEOPLE
══════════════════════════════════════════ */
.people-row {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  margin-bottom: 0.85rem; min-height: 34px; align-items: center;
}
.person-chip {
  display: flex; align-items: center; gap: 0.38rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 100px; padding: 0.22rem 0.5rem 0.22rem 0.28rem;
  font-size: 0.83rem; font-weight: 500; color: var(--text);
  transition: background 0.12s, border-color 0.12s;
}
.person-chip:hover { background: var(--surface3); }
.avatar {
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-weight: 700; flex-shrink: 0; letter-spacing: -0.02em;
}
.remove-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-hint); font-size: 1rem; line-height: 1;
  padding: 0 0 0 0.1rem; display: flex; align-items: center;
  transition: color 0.1s;
}
.remove-btn:hover { color: var(--negative); }

.input-row { display: flex; gap: 0.45rem; }

input[type=text], input[type=number], select {
  padding: 0.55rem 0.8rem;
  border: 1.5px solid var(--border-soft);
  border-radius: var(--radius);
  font-size: 0.88rem; font-family: inherit;
  background: var(--surface); color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.3s, color 0.3s;
  -webkit-appearance: none;
}
input[type=text]:focus, input[type=number]:focus, select:focus {
  border-color: var(--lilac-deep);
  box-shadow: 0 0 0 3px rgba(160,144,186,0.2);
}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn {
  padding: 0.55rem 1rem; border-radius: var(--radius);
  font-size: 0.87rem; font-weight: 600; font-family: inherit;
  cursor: pointer; border: none; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 0.32rem;
  white-space: nowrap;
}
.btn:active { transform: scale(0.96); }

.btn-primary {
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  color: #fff; box-shadow: 0 2px 8px rgba(123,94,167,0.35);
}
.btn-primary:hover { opacity: 0.9; box-shadow: 0 4px 14px rgba(123,94,167,0.45); }

.btn-soft {
  background: var(--surface2); color: var(--lilac-dark);
  border: 1.5px solid var(--border);
}
.btn-soft:hover { background: var(--surface3); }
[data-theme="dark"] .btn-soft { color: var(--lilac-dark); }

.btn-danger {
  background: var(--negative-bg); color: var(--negative);
  border: 1px solid var(--negative-border);
}
.btn-danger:hover { filter: brightness(1.08); }
.btn-icon { padding: 0.45rem 0.55rem; border-radius: 10px; }

/* ══════════════════════════════════════════
   EXPENSE ITEMS
══════════════════════════════════════════ */
.expense-item {
  border: 1.5px solid var(--border-soft); border-radius: var(--radius);
  padding: 0.95rem 1rem; margin-bottom: 0.6rem;
  background: var(--surface2);
  transition: border-color 0.15s, box-shadow 0.15s, background 0.3s;
}
.expense-item:hover { border-color: var(--border); box-shadow: 0 3px 10px rgba(90,60,140,0.08); }
[data-theme="dark"] .expense-item:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.3); }

.expense-header { display: flex; align-items: flex-start; gap: 0.6rem; margin-bottom: 0.7rem; }
.expense-index {
  font-size: 0.66rem; font-weight: 700; color: var(--text-hint);
  background: var(--surface); border: 1px solid var(--border-soft);
  border-radius: 8px; min-width: 23px; height: 23px;
  display: flex; align-items: center; justify-content: center;
  margin-top: 3px; flex-shrink: 0; transition: background 0.3s;
}
.expense-fields { flex:1; display: flex; flex-wrap: wrap; gap: 0.4rem; }
.expense-fields input, .expense-fields select {
  padding: 0.44rem 0.66rem; font-size: 0.85rem; border-radius: 10px;
}
.field-desc { flex:2; min-width: 120px; }
.field-amount { width: 110px; }
.field-payer { min-width: 98px; flex:1; }

.split-label {
  font-size: 0.66rem; font-weight: 600; color: var(--text-hint);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.38rem;
}
.split-people { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.split-toggle {
  display: flex; align-items: center; gap: 0.28rem;
  padding: 0.2rem 0.55rem 0.2rem 0.3rem;
  border-radius: 100px; border: 1.5px solid var(--border);
  cursor: pointer; font-size: 0.78rem; font-weight: 500;
  background: var(--surface); color: var(--text-muted);
  transition: all 0.12s; user-select: none;
}
.split-toggle.active {
  background: linear-gradient(135deg, rgba(123,94,167,0.1), rgba(160,144,186,0.14));
  border-color: var(--lilac-deep); color: var(--lilac-darker);
}
[data-theme="dark"] .split-toggle.active {
  background: rgba(150,120,200,0.18);
  color: var(--lilac-dark);
}

.expense-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 0.55rem; padding-top: 0.55rem;
  border-top: 1px solid var(--border-soft);
  font-size: 0.76rem; color: var(--text-hint);
  gap: 0.5rem; flex-wrap: wrap;
}
.footer-amounts { display: flex; align-items: center; gap: 0.38rem; flex-wrap: wrap; }
.per-person-pill {
  font-size: 0.76rem; font-weight: 600;
  background: var(--lilac-light); color: var(--lilac-darker);
  border-radius: 100px; padding: 0.14rem 0.58rem;
  border: 1px solid var(--border);
  transition: background 0.3s, color 0.3s;
}
[data-theme="dark"] .per-person-pill { color: var(--lilac-dark); }
.per-person-converted {
  font-size: 0.73rem; color: var(--text-muted);
  background: var(--surface3); border-radius: 100px;
  padding: 0.12rem 0.5rem; border: 1px solid var(--border-soft);
  transition: background 0.3s;
}

.add-expense-bar { display: flex; justify-content: flex-end; padding-top: 0.2rem; }

/* ══════════════════════════════════════════
   SUMMARY
══════════════════════════════════════════ */
.summary-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 0.65rem; margin-bottom: 1.1rem;
}
.stat-card {
  background: var(--surface2); border-radius: 14px;
  border: 1px solid var(--border-soft); padding: 0.8rem 0.9rem; text-align: center;
  transition: background 0.3s;
}
.stat-card.accent-stat {
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  border-color: transparent;
}
.stat-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-hint); margin-bottom: 0.18rem; font-weight: 600;
}
.accent-stat .stat-label { color: rgba(255,255,255,0.72); }
.stat-value { font-size: 1.28rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
.accent-stat .stat-value { color: #fff; }
.stat-converted { font-size: 0.73rem; color: rgba(255,255,255,0.72); margin-top: 0.08rem; }
.stat-converted-muted { font-size: 0.73rem; color: var(--text-hint); margin-top: 0.08rem; }

.balance-table { width: 100%; border-collapse: collapse; }
.balance-table th {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-hint); font-weight: 600; text-align: left;
  padding: 0 0 0.45rem; border-bottom: 1px solid var(--border-soft);
}
.balance-table td {
  padding: 0.52rem 0; font-size: 0.86rem;
  border-bottom: 1px solid var(--border-soft); vertical-align: middle;
}
.balance-table tr:last-child td { border-bottom: none; }
.person-cell { display: flex; align-items: center; gap: 0.45rem; font-weight: 500; }
.amount-positive { color: var(--positive); font-weight: 700; }
.amount-negative { color: var(--negative); font-weight: 700; }
.amount-zero { color: var(--text-hint); }
.converted-sub { display: block; font-size: 0.7rem; color: var(--text-hint); font-weight: 400; }

.settlement-list { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }
.settlement-list li {
  display: flex; align-items: center; gap: 0.45rem;
  padding: 0.58rem 0.85rem; border-radius: 12px; font-size: 0.85rem;
  background: var(--warning-bg); border: 1px solid var(--warning-border);
  flex-wrap: wrap; transition: background 0.3s;
}
.arrow-icon { color: var(--warning); flex-shrink: 0; }
.settle-amount {
  margin-left: auto; font-weight: 700; color: var(--warning);
  background: rgba(154,112,64,0.12); border-radius: 100px;
  padding: 0.1rem 0.55rem; font-size: 0.83rem;
}
[data-theme="dark"] .settle-amount { background: rgba(200,152,80,0.18); }
.settle-converted { font-size: 0.72rem; color: var(--text-muted); }

.no-settle {
  padding: 0.8rem; border-radius: 12px;
  background: var(--positive-bg); color: var(--positive);
  font-size: 0.86rem; font-weight: 600; text-align: center;
  border: 1px solid var(--positive-border); transition: background 0.3s;
}

.divider { height: 1px; background: var(--border-soft); margin: 0.95rem 0; }
.empty-state { text-align: center; color: var(--text-hint); font-size: 0.85rem; padding: 1.4rem 0; }
.badge {
  display: inline-flex; align-items: center;
  font-size: 0.7rem; font-weight: 600;
  padding: 0.14rem 0.5rem; border-radius: 100px;
  background: var(--lilac-light); color: var(--lilac-darker);
  border: 1px solid var(--border); transition: background 0.3s;
}
[data-theme="dark"] .badge { color: var(--lilac-dark); }

/* ══════════════════════════════════════════
   FAB & TOAST
══════════════════════════════════════════ */
.share-fab {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
  color: #fff; border: none; border-radius: 100px;
  padding: 0.7rem 1.25rem; font-size: 0.86rem; font-weight: 600;
  font-family: inherit; cursor: pointer;
  box-shadow: 0 4px 20px rgba(123,94,167,0.45);
  display: flex; align-items: center; gap: 0.45rem;
  transition: all 0.18s; z-index: 50;
}
.share-fab:hover { box-shadow: 0 6px 24px rgba(123,94,167,0.55); transform: translateY(-2px); }

.toast {
  position: fixed; bottom: 5.5rem; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text); color: var(--bg);
  border-radius: 100px; padding: 0.52rem 1.3rem;
  font-size: 0.83rem; font-weight: 500;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; white-space: nowrap; z-index: 200;
  font-family: inherit;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════════════════
   AVATAR COLORS — light / dark variants
══════════════════════════════════════════ */
.av0 { background:#E8DFFE; color:#4A2E9E; }
.av1 { background:#D6EEFF; color:#0C4F8E; }
.av2 { background:#FFE4F0; color:#8E1A4E; }
.av3 { background:#D6F5E9; color:#1A6644; }
.av4 { background:#FFF3D6; color:#8E5A00; }
.av5 { background:#FFE0E0; color:#8E2020; }
.av6 { background:#D6F0FF; color:#1A5A8E; }
.av7 { background:#F0FFD6; color:#4A7A1A; }

[data-theme="dark"] .av0 { background:#2E1E5A; color:#C0A8F8; }
[data-theme="dark"] .av1 { background:#102040; color:#80C0FF; }
[data-theme="dark"] .av2 { background:#3A1028; color:#F0A0C0; }
[data-theme="dark"] .av3 { background:#0E2E1E; color:#70D090; }
[data-theme="dark"] .av4 { background:#2E2008; color:#E0C070; }
[data-theme="dark"] .av5 { background:#2E0E0E; color:#F08080; }
[data-theme="dark"] .av6 { background:#0E2030; color:#70C0F0; }
[data-theme="dark"] .av7 { background:#1E2E08; color:#A0D060; }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 520px) {
  .expense-fields { flex-direction: column; }
  .field-amount, .field-payer { width: 100%; }
  .summary-grid { grid-template-columns: 1fr 1fr; }
  .summary-grid .stat-card:first-child { grid-column: 1/-1; }
  .logo-text p { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-block">
      <div class="logo-icon">🍚</div>
      <div class="logo-text">
        <h1>HarnKao</h1>
        <p>หารข้าว — Trip Expense Splitter</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="currency-pill">
        <select id="currency-select" onchange="onCurrencyChange(this.value)" title="Display currency">
          <option value="THB">🇹🇭 THB</option>
          <option value="USD">🇺🇸 USD</option>
          <option value="EUR">🇪🇺 EUR</option>
          <option value="GBP">🇬🇧 GBP</option>
          <option value="JPY">🇯🇵 JPY</option>
          <option value="CNY">🇨🇳 CNY</option>
          <option value="SGD">🇸🇬 SGD</option>
          <option value="KRW">🇰🇷 KRW</option>
          <option value="AUD">🇦🇺 AUD</option>
          <option value="HKD">🇭🇰 HKD</option>
          <option value="MYR">🇲🇾 MYR</option>
          <option value="INR">🇮🇳 INR</option>
        </select>
      </div>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </div>
</header>

<div class="main">

  <!-- Rate banner -->
  <div class="rate-banner" id="rate-banner">
    <span class="dot dot-off" id="rate-dot"></span>
    <span id="rate-text">Loading rates…</span>
    <span class="rate-status" id="rate-status"></span>
  </div>

  <!-- People -->
  <div>
    <div class="section-eyebrow">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      People in the trip
    </div>
    <div class="card">
      <div class="people-row" id="people-row"></div>
      <div class="input-row">
        <input type="text" id="new-person-input" placeholder="Add a name, e.g. Emma" maxlength="20" style="flex:1" />
        <button class="btn btn-primary" onclick="addPerson()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
    </div>
  </div>

  <!-- Expenses -->
  <div>
    <div class="section-eyebrow">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Expenses
    </div>
    <div class="card">
      <div id="expenses-list"></div>
      <div class="add-expense-bar">
        <button class="btn btn-soft" onclick="addExpense()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add expense
        </button>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div>
    <div class="section-eyebrow">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Summary
    </div>
    <div class="card">
      <div id="summary-content">
        <div class="empty-state">Add people and expenses above to see the summary.</div>
      </div>
    </div>
  </div>

</div>

<button class="share-fab" onclick="shareTrip()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  Copy share link
</button>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   CURRENCY
══════════════════════════════════════════ */
const SYM = { THB:'฿',USD:'$',EUR:'€',GBP:'£',JPY:'¥',CNY:'¥',SGD:'S$',KRW:'₩',AUD:'A$',HKD:'HK$',MYR:'RM',INR:'₹' };
const NODEC = new Set(['JPY','KRW']);

let activeCurrency = 'THB';
let rates = {};
let rateSource = 'off';
let rateAge = 0;

async function fetchRates() {
  const banner = document.getElementById('rate-banner');
  if (activeCurrency === 'THB') { banner.style.display = 'none'; return; }
  banner.style.display = 'flex';
  document.getElementById('rate-text').textContent = 'Fetching rates…';
  document.getElementById('rate-dot').className = 'dot dot-off';

  // Try cache (< 1 hour)
  try {
    const c = JSON.parse(localStorage.getItem('hk_rates') || 'null');
    if (c && Date.now() - c.ts < 3600000) {
      rates = c.rates; rateSource = 'cache'; rateAge = Math.round((Date.now()-c.ts)/60000);
      updateRateBanner(); renderExpenses(); renderSummary();
    }
  } catch(e){}

  // Live fetch
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/THB');
    if (!res.ok) throw new Error();
    const data = await res.json();
    rates = data.rates; rateSource = 'live'; rateAge = 0;
    try { localStorage.setItem('hk_rates', JSON.stringify({ts:Date.now(), rates})); } catch(e){}
    updateRateBanner(); renderExpenses(); renderSummary();
  } catch(e) {
    if (rateSource !== 'cache') {
      // Approximate fallback (mid-2025)
      rates = {USD:0.0278,EUR:0.0256,GBP:0.0219,JPY:4.19,CNY:0.201,
               SGD:0.0372,KRW:38.3,AUD:0.0431,HKD:0.217,MYR:0.128,INR:2.32,THB:1};
      rateSource = 'off';
      updateRateBanner(); renderExpenses(); renderSummary();
    }
  }
}

function updateRateBanner() {
  const banner = document.getElementById('rate-banner');
  if (activeCurrency === 'THB') { banner.style.display = 'none'; return; }
  banner.style.display = 'flex';
  const r = rates[activeCurrency];
  const sym = SYM[activeCurrency]||activeCurrency;
  const dec = NODEC.has(activeCurrency) ? 0 : (r < 1 ? 4 : 2);
  document.getElementById('rate-text').innerHTML = r
    ? `<strong>฿1 = ${sym}${r.toFixed(dec)}</strong> &nbsp;(base: Thai Baht)`
    : 'Rate unavailable';
  const dotEl = document.getElementById('rate-dot');
  const stEl  = document.getElementById('rate-status');
  if (rateSource==='live')       { dotEl.className='dot dot-live';  stEl.textContent='Live'; }
  else if (rateSource==='cache') { dotEl.className='dot dot-cache'; stEl.textContent='Cached '+rateAge+'m ago'; }
  else                           { dotEl.className='dot dot-off';   stEl.textContent='Approximate (offline)'; }
}

function fmt(thb) {
  if (activeCurrency==='THB' || !rates[activeCurrency])
    return { primary: '฿'+thb.toFixed(2), secondary: null };
  const c = thb * rates[activeCurrency];
  const sym = SYM[activeCurrency]||activeCurrency;
  const dec = NODEC.has(activeCurrency) ? 0 : 2;
  return { primary: '฿'+thb.toFixed(2), secondary: sym+c.toFixed(dec) };
}

function onCurrencyChange(cur) {
  activeCurrency = cur;
  try { localStorage.setItem('hk_currency', cur); } catch(e){}
  fetchRates();
}

/* ══════════════════════════════════════════
   THEME
══════════════════════════════════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next==='dark' ? '☀️' : '🌙';
  try { localStorage.setItem('hk_theme', next); } catch(e){}
}
function loadTheme() {
  try {
    const t = localStorage.getItem('hk_theme');
    if (t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('theme-btn').textContent = t==='dark' ? '☀️' : '🌙';
    }
  } catch(e){}
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const AV = ['av0','av1','av2','av3','av4','av5','av6','av7'];
let state = { people:[], expenses:[] };

function getAv(name) { return AV[state.people.indexOf(name) % AV.length]; }

function avEl(name, size) {
  size = size||26;
  const fs = size < 22 ? '0.56rem' : '0.68rem';
  return `<div class="avatar ${getAv(name)}" style="width:${size}px;height:${size}px;font-size:${fs}">${name.trim().slice(0,2).toUpperCase()}</div>`;
}

/* ══════════════════════════════════════════
   PEOPLE
══════════════════════════════════════════ */
function addPerson() {
  const inp = document.getElementById('new-person-input');
  const name = inp.value.trim();
  if (!name) return;
  if (state.people.includes(name)) { showToast('Name already exists!'); return; }
  if (state.people.length>=8) { showToast('Max 8 people supported.'); return; }
  state.people.push(name);
  inp.value = '';
  renderPeople(); renderExpenses(); renderSummary(); save();
}

function removePerson(name) {
  if (!confirm('Remove '+name+'? They\'ll be removed from all splits.')) return;
  state.people = state.people.filter(p=>p!==name);
  state.expenses.forEach(e=>{
    e.splitWith = e.splitWith.filter(p=>p!==name);
    if (e.payer===name) e.payer='';
  });
  renderPeople(); renderExpenses(); renderSummary(); save();
}

function renderPeople() {
  const row = document.getElementById('people-row');
  if (!state.people.length) {
    row.innerHTML = '<span style="font-size:0.82rem;color:var(--text-hint)">No one yet — add a name below.</span>';
    return;
  }
  row.innerHTML = state.people.map(n=>`
    <div class="person-chip">
      ${avEl(n,24)}
      <span>${esc(n)}</span>
      <button class="remove-btn" onclick="removePerson('${esc(n)}')" title="Remove">×</button>
    </div>`).join('');
}

/* ══════════════════════════════════════════
   EXPENSES
══════════════════════════════════════════ */
function addExpense() {
  state.expenses.push({id:Date.now(), desc:'', amount:'', payer:state.people[0]||'', splitWith:[...state.people]});
  renderExpenses(); renderSummary(); save();
}

function removeExpense(id) {
  state.expenses = state.expenses.filter(e=>e.id!==id);
  renderExpenses(); renderSummary(); save();
}

function updateExpense(id, field, value) {
  const e = state.expenses.find(e=>e.id===id);
  if (!e) return;
  e[field] = value;
  if (field==='amount'||field==='splitWith') rerenderFooter(id);
  renderSummary(); save();
}

function toggleSplit(id, name) {
  const e = state.expenses.find(e=>e.id===id);
  if (!e) return;
  const idx = e.splitWith.indexOf(name);
  if (idx===-1) e.splitWith.push(name);
  else if (e.splitWith.length>1) e.splitWith.splice(idx,1);
  else { showToast('At least one person must share this expense.'); return; }
  document.querySelectorAll('[data-expense="'+id+'"] .split-toggle').forEach(el=>{
    el.classList.toggle('active', e.splitWith.includes(el.dataset.name));
  });
  rerenderFooter(id); renderSummary(); save();
}

function rerenderFooter(id) {
  const e = state.expenses.find(e=>e.id===id);
  if (!e) return;
  const footer = document.querySelector('[data-expense="'+id+'"] .expense-footer');
  if (!footer) return;
  footer.innerHTML = footerHTML(e);
}

function footerHTML(e) {
  const amt = parseFloat(e.amount)||0;
  const n   = e.splitWith.length;
  const per = n>0 ? amt/n : 0;
  const f   = fmt(per);
  let html  = `<span>${n} sharing</span><div class="footer-amounts">`;
  if (per>0) {
    html += `<span class="per-person-pill">${f.primary} each</span>`;
    if (f.secondary) html += `<span class="per-person-converted">${f.secondary}</span>`;
  }
  return html + '</div>';
}

function renderExpenses() {
  const list = document.getElementById('expenses-list');
  if (!state.expenses.length) {
    list.innerHTML = '<div class="empty-state">No expenses yet — add one below.</div>';
    return;
  }
  list.innerHTML = state.expenses.map((e,i) => `
    <div class="expense-item" data-expense="${e.id}">
      <div class="expense-header">
        <div class="expense-index">${i+1}</div>
        <div class="expense-fields">
          <input class="field-desc" type="text" placeholder="What was it?" value="${esc(e.desc)}"
            onchange="state.expenses.find(x=>x.id==${e.id}).desc=this.value;renderSummary();save()" />
          <input class="field-amount" type="number" placeholder="Amount (฿)" value="${esc(e.amount)}"
            oninput="updateExpense(${e.id},'amount',this.value)" />
          <select class="field-payer" onchange="updateExpense(${e.id},'payer',this.value)">
            <option value="">— Paid by —</option>
            ${state.people.map(p=>`<option value="${esc(p)}" ${e.payer===p?'selected':''}>${esc(p)}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-danger btn-icon" onclick="removeExpense(${e.id})" title="Delete">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
      <div class="split-label">Split between</div>
      <div class="split-people">
        ${state.people.length===0
          ? '<span style="font-size:0.79rem;color:var(--text-hint)">Add people first</span>'
          : state.people.map(p=>`
            <div class="split-toggle ${e.splitWith.includes(p)?'active':''}" data-name="${esc(p)}"
              onclick="toggleSplit(${e.id},'${esc(p)}')">${avEl(p,16)} ${esc(p)}</div>`).join('')}
      </div>
      <div class="expense-footer">${footerHTML(e)}</div>
    </div>`).join('');
}

/* ══════════════════════════════════════════
   SUMMARY  ← corrected logic
   For each expense:
     • payer gets credited the full amount
     • every person in splitWith gets debited (amount / splitWith.length)
   net[p] = totalPaid[p] - totalOwed[p]
   positive net → others owe them
   negative net → they owe others
══════════════════════════════════════════ */
function renderSummary() {
  const el = document.getElementById('summary-content');
  if (!state.people.length || !state.expenses.length) {
    el.innerHTML = '<div class="empty-state">Add people and expenses to see the summary.</div>';
    return;
  }

  const totalSpent = state.expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0), 0);
  const valid = state.expenses.filter(e => e.payer && parseFloat(e.amount)>0 && e.splitWith.length>0);

  // Initialise
  const paid = {}, owed = {};
  state.people.forEach(p => { paid[p]=0; owed[p]=0; });

  // Accumulate — each expense independently
  valid.forEach(e => {
    const amt   = parseFloat(e.amount);
    const share = amt / e.splitWith.length;  // equal share among splitWith

    // Payer fronted the whole expense
    paid[e.payer] = (paid[e.payer]||0) + amt;

    // Each person in splitWith owes their share
    e.splitWith.forEach(p => { owed[p] = (owed[p]||0) + share; });
  });

  // Net balance: positive = others owe you, negative = you owe others
  const balance = {};
  state.people.forEach(p => { balance[p] = (paid[p]||0) - (owed[p]||0); });

  const settlements = computeSettlements({...balance});
  const f = fmt(totalSpent);

  el.innerHTML = `
    <div class="summary-grid">
      <div class="stat-card accent-stat">
        <div class="stat-label">Total spent</div>
        <div class="stat-value">${f.primary}</div>
        ${f.secondary ? `<div class="stat-converted">${f.secondary}</div>` : ''}
      </div>
      <div class="stat-card">
        <div class="stat-label">Expenses</div>
        <div class="stat-value">${state.expenses.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">People</div>
        <div class="stat-value">${state.people.length}</div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="section-eyebrow" style="margin-bottom:0.65rem">Balance per person</div>
    <table class="balance-table">
      <thead><tr><th>Person</th><th>Paid</th><th>Owes (share)</th><th>Net</th></tr></thead>
      <tbody>
        ${state.people.map(p => {
          const net = balance[p];
          const cls = net>0.005?'amount-positive':net<-0.005?'amount-negative':'amount-zero';
          const lbl = net>0.005 ? '+'+fmt(net).primary : net<-0.005 ? '-'+fmt(Math.abs(net)).primary : fmt(0).primary;
          const fp = fmt(paid[p]||0);
          const fo = fmt(owed[p]||0);
          return `<tr>
            <td><div class="person-cell">${avEl(p,24)}<span>${esc(p)}</span></div></td>
            <td>${fp.primary}${fp.secondary?`<span class="converted-sub">${fp.secondary}</span>`:''}
            </td>
            <td>${fo.primary}${fo.secondary?`<span class="converted-sub">${fo.secondary}</span>`:''}
            </td>
            <td class="${cls}">${lbl}${(() => {
              const fn = fmt(Math.abs(net));
              return fn.secondary ? `<span class="converted-sub">${fn.secondary}</span>` : '';
            })()}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <div class="divider"></div>
    <div class="section-eyebrow" style="margin-bottom:0.65rem">Who pays whom</div>
    ${settlements.length===0
      ? '<div class="no-settle">✓ All settled up! No transfers needed.</div>'
      : `<ul class="settlement-list">${settlements.map(s => {
          const fs = fmt(s.amount);
          return `<li>
            <div class="person-cell" style="flex:none">${avEl(s.from,22)}<strong>${esc(s.from)}</strong></div>
            <svg class="arrow-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            <div class="person-cell" style="flex:none">${avEl(s.to,22)}<strong>${esc(s.to)}</strong></div>
            <span class="settle-amount">${fs.primary}</span>
            ${fs.secondary?`<span class="settle-converted">${fs.secondary}</span>`:''}
          </li>`;
        }).join('')}</ul>`}

    <div class="divider"></div>
    <div class="section-eyebrow" style="margin-bottom:0.65rem">Expense breakdown</div>
    <table class="balance-table">
      <thead><tr><th>#</th><th>Item</th><th>Amount</th><th>Paid by</th><th>Shared by</th><th>Per person</th></tr></thead>
      <tbody>
        ${state.expenses.map((e,i) => {
          const amt = parseFloat(e.amount)||0;
          const per = e.splitWith.length>0 ? amt/e.splitWith.length : 0;
          const fa  = fmt(amt);
          const fp2 = fmt(per);
          return `<tr>
            <td style="color:var(--text-hint);font-size:0.79rem">${i+1}</td>
            <td>${esc(e.desc||'—')}</td>
            <td>${fa.primary}${fa.secondary?`<span class="converted-sub">${fa.secondary}</span>`:''}</td>
            <td>${e.payer?`<div class="person-cell">${avEl(e.payer,18)}<span>${esc(e.payer)}</span></div>`:'<span style="color:var(--text-hint)">—</span>'}</td>
            <td style="font-size:0.79rem;color:var(--text-muted)">${e.splitWith.map(p=>esc(p)).join(', ')||'—'}</td>
            <td><span class="badge">${fp2.primary}</span>${fp2.secondary?`<br><span style="font-size:0.68rem;color:var(--text-hint)">${fp2.secondary}</span>`:''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

/* ══════════════════════════════════════════
   SETTLEMENT ALGORITHM
   Greedy: largest creditor ↔ largest debtor
══════════════════════════════════════════ */
function computeSettlements(bal) {
  const cred=[], debt=[];
  Object.entries(bal).forEach(([n,a]) => {
    if (a> 0.005) cred.push({name:n, amt: a});
    if (a<-0.005) debt.push({name:n, amt:-a});
  });
  cred.sort((a,b)=>b.amt-a.amt);
  debt.sort((a,b)=>b.amt-a.amt);
  const res=[]; let ci=0,di=0;
  while (ci<cred.length && di<debt.length) {
    const c=cred[ci], d=debt[di], t=Math.min(c.amt,d.amt);
    res.push({from:d.name, to:c.name, amount:t});
    c.amt-=t; d.amt-=t;
    if (c.amt<0.005) ci++;
    if (d.amt<0.005) di++;
  }
  return res;
}

/* ══════════════════════════════════════════
   SHARE / PERSIST
══════════════════════════════════════════ */
function shareTrip() {
  const data = btoa(encodeURIComponent(JSON.stringify(state)));
  const url  = window.location.href.split('?')[0]+'?trip='+data;
  navigator.clipboard.writeText(url)
    .then(()=>showToast('Link copied! Share with your friends 🎉'))
    .catch(()=>prompt('Copy this link:', url));
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function save() {
  try { localStorage.setItem('harnkao', JSON.stringify(state)); } catch(e){}
}

function loadState() {
  const params = new URLSearchParams(window.location.search);
  const trip   = params.get('trip');
  if (trip) { try { state=JSON.parse(decodeURIComponent(atob(trip))); return; } catch(e){} }
  try { const s=localStorage.getItem('harnkao'); if(s){state=JSON.parse(s); return;} } catch(e){}
  // Default sample data
  state = {
    people: ['A','B','C','D'],
    expenses: [
      {id:1, desc:'Car fuel',   amount:'1000', payer:'A', splitWith:['A','B','C','D']},
      {id:2, desc:'Breakfast',  amount:'620',  payer:'A', splitWith:['A','B','C','D']},
      {id:3, desc:'Coffee',     amount:'300',  payer:'B', splitWith:['A','B','C']},
      {id:4, desc:'Movies',     amount:'420',  payer:'C', splitWith:['A','B','C','D']},
      {id:5, desc:'Dinner',     amount:'1177', payer:'D', splitWith:['A','B','C','D']}
    ]
  };
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
loadTheme();
loadState();

try {
  const savedCur = localStorage.getItem('hk_currency');
  if (savedCur) {
    activeCurrency = savedCur;
    document.getElementById('currency-select').value = savedCur;
    fetchRates();
  }
} catch(e){}

renderPeople(); renderExpenses(); renderSummary();

document.getElementById('new-person-input').addEventListener('keydown', e => {
  if (e.key==='Enter') addPerson();
});
</script>
</body>
</html>
